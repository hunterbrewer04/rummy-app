name: RummyTracker

options:
  bundleIdPrefix: com.hunterbrewer
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    ENABLE_TESTABILITY: "YES"

targets:
  RummyTracker:
    type: application
    platform: iOS
    sources:
      - path: RummyTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hunterbrewer.RummyTracker
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: Rummy
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        TARGETED_DEVICE_FAMILY: "1"

  RummyTrackerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RummyTrackerTests
    dependencies:
      - target: RummyTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hunterbrewer.RummyTrackerTests
        GENERATE_INFOPLIST_FILE: "YES"

schemes:
  RummyTracker:
    build:
      targets:
        RummyTracker: all
        RummyTrackerTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - RummyTrackerTests
